services:
  elasticsearch:
    image: elasticsearch:7.17.28
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  logstash:
    image: logstash:7.17.28
    environment:
      - xpack.monitoring.enabled=false
    volumes:
      # Pipeline config directory — can start empty
      - ./.logstash/pipeline:/usr/share/logstash/pipeline:ro
      # Host log directories
      - ./logs/mitmproxy:/var/log/mitmproxy:ro
      - ./logs/ralph:/var/log/ralph:ro
      # sincedb persistence across container restarts
      - logstash-sincedb:/var/lib/logstash/sincedb
    depends_on:
      elasticsearch:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin

volumes:
  logstash-sincedb:
