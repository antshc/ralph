services:
  ralph:
    build: ./src
    cap_add:
      - NET_ADMIN
    stdin_open: true   # -i
    tty: true          # -t
    sysctls:
      net.ipv4.conf.all.route_localnet: 1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
      - COPILOT_LOG_LEVEL=debug
      - CHOWN_DIRS=/var/log/ralph
      # - AFK_DRY_RUN=0 run real copilot
      - AFK_DEBUG=1
    volumes:
      # Proxy traffic logs written by mitmproxy (one file per session, timestamped)
      - ./logs/mitmproxy:/var/log/mitmproxy
      # Copilot CLI session logs for debugging and audit
      - ./logs/copilot:/var/log/copilot
      - ./logs/ralph:/var/log/ralph
      # Project files — the working directory inside the container
      - ${WORKSPACE:?WORKSPACE is required}:/home/ubuntu/workspace
      - ${WORKTREES:?WORKTREES is required}:/home/ubuntu/workspace.worktrees
      # Host global git identity used as fallback when the repo has no local user config
      - ~/.gitconfig:/home/ubuntu/.gitconfig:ro
      # GitHub CLI auth tokens — required for `gh` commands inside the container
      - ~/.config/gh:/home/ubuntu/.config/gh:ro
      # Run plugin installs at startup (after proxy is ready)
      - ./src/setup.sh:/etc/sandbox/setup.sh:ro
      # Optional: expose the host Docker socket so integration tests can manage containers.
      # WARNING: This grants full Docker daemon access (equivalent to root on the host).
      # Only enable for trusted developer workloads — never in production or untrusted CI.
      # - /var/run/docker.sock:/var/run/docker.sock
    # Positional args for `ralph <repo-dir> <github-user> <owner/repo>`
    # Set GITHUB_USER and GITHUB_REPO before running.
    command:
      - afk_fix_prs
      - --repo_dir /home/ubuntu/workspace
      - --github_user ${GITHUB_USER:?GITHUB_USER is required}
      - --github_repo ${GITHUB_REPO:?GITHUB_REPO is required}
