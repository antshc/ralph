name: Docker Image CI

on:
  push:
    branches: [ "main", "dev", "workspace" ]
  workflow_dispatch:
    inputs:
      no_cache:
        description: Build without using Docker cache
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:

  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set release vars
        id: vars
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "archive=ralph.tar.gz" >> "$GITHUB_OUTPUT"
            echo "tag=v0.1.0-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "archive=ralph-${BRANCH}.tar.gz" >> "$GITHUB_OUTPUT"
            echo "tag=${BRANCH}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create archive
        run: tar -czf ${{ steps.vars.outputs.archive }} -C runtime .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.vars.outputs.prerelease == 'true' }}
          files: ${{ steps.vars.outputs.archive }}

  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: antshc/ralph
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (cached)
        uses: docker/build-push-action@v6
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.no_cache == true) }}
        with:
          context: ./src
          file: src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: CACHEBUST=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (no cache)
        uses: docker/build-push-action@v6
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.no_cache == true }}
        with:
          context: ./src
          file: src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: CACHEBUST=${{ github.run_number }}
          no-cache: true
