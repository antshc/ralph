name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_base:
        description: Pull latest antshc/cage base image
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create archive
        run: tar -czf ralph.tar.gz -C runtime .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v0.1.0-${{ github.run_number }}"
          name: "v0.1.0-${{ github.run_number }}"
          generate_release_notes: true
          files: ralph.tar.gz

  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: antshc/ralph
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=build-${{ github.run_number }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          pull: ${{ github.event_name == 'workflow_dispatch' && inputs.update_base }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
