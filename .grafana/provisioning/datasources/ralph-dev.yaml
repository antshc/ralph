apiVersion: 1

datasources:
  - name: ralph-dev
    type: elasticsearch
    uid: ralph-dev
    url: http://elasticsearch:9200
    access: proxy
    database: "logs-ralph-dev-*"
    isDefault: false
    jsonData:
      esVersion: "70"
      timeField: "@timestamp"
      maxConcurrentShardRequests: 5
      logMessageField: message
      logLevelField: level
    editable: false
