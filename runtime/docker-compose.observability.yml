services:
  elasticsearch:
    image: elasticsearch:7.17.28
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  logstash:
    image: logstash:7.17.28
    user: "0"
    environment:
      - xpack.monitoring.enabled=false
    volumes:
      # Pipeline config directory — can start empty
      - ./.logstash/pipeline:/usr/share/logstash/pipeline:ro
      # Host log directories
      - ../logs/mitmproxy:/var/log/mitmproxy:ro
      - ../logs/ralph:/var/log/ralph:ro
      # sincedb persistence across container restarts
      - logstash-sincedb:/var/lib/logstash/sincedb
    depends_on:
      elasticsearch:
        condition: service_healthy

  es-ilm-init:
    image: curlimages/curl:latest
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        ES=http://elasticsearch:9200

        echo ">>> Creating ILM policy ralph-logs-7d"
        curl -sf -X PUT "$$ES/_ilm/policy/ralph-logs-7d" \
          -H 'Content-Type: application/json' \
          -d '{"policy":{"phases":{"delete":{"min_age":"7d","actions":{"delete":{}}}}}}'

        echo ">>> Composable index template: logs-mitmproxy (priority 200)"
        curl -sf -X PUT "$$ES/_index_template/logs-mitmproxy" \
          -H 'Content-Type: application/json' \
          -d '{"priority":200,"index_patterns":["logs-mitmproxy-*"],"data_stream":null,"template":{"settings":{"index.lifecycle.name":"ralph-logs-7d"}}}'

        echo ">>> Composable index template: logs-mitmproxy-malformed (priority 200)"
        curl -sf -X PUT "$$ES/_index_template/logs-mitmproxy-malformed" \
          -H 'Content-Type: application/json' \
          -d '{"priority":200,"index_patterns":["logs-mitmproxy-malformed-*"],"data_stream":null,"template":{"settings":{"index.lifecycle.name":"ralph-logs-7d"}}}'

        echo ">>> Composable index template: logs-ralph-dev (priority 200)"
        curl -sf -X PUT "$$ES/_index_template/logs-ralph-dev" \
          -H 'Content-Type: application/json' \
          -d '{"priority":200,"index_patterns":["logs-ralph-dev-*"],"data_stream":null,"template":{"settings":{"index.lifecycle.name":"ralph-logs-7d"}}}'

        echo ">>> Composable index template: logs-ralph-fix_prs (priority 200)"
        curl -sf -X PUT "$$ES/_index_template/logs-ralph-fix_prs" \
          -H 'Content-Type: application/json' \
          -d '{"priority":200,"index_patterns":["logs-ralph-fix_prs-*"],"data_stream":null,"template":{"settings":{"index.lifecycle.name":"ralph-logs-7d"}}}'

        echo ">>> ILM setup complete"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - ./.grafana/provisioning:/etc/grafana/provisioning:ro
      - ./.grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  logstash-sincedb:
