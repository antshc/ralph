input {
  file {
    path             => ["/var/log/ralph/*.log", "/var/log/ralph/*.json"]
    start_position   => "beginning"
    sincedb_path     => "/var/lib/logstash/sincedb/ralph"
    codec            => plain { ecs_compatibility => "disabled" }
    tags             => ["ralph"]
    ecs_compatibility => "disabled"
  }
}

filter {
  if "ralph" in [tags] {
    json {
      source         => "message"
      tag_on_failure => ["_jsonparsefailure"]
    }

    # Parse embedded JSON in the `message` field into queryable top-level fields
    if [message] =~ /^\{/ {
      json {
        source         => "message"
        target         => "_msg"
        tag_on_failure => ["_msg_jsonparsefailure"]
      }

      if "_msg_jsonparsefailure" not in [tags] {
        mutate {
          rename => {
            "[_msg][type]"              => "msg_type"
            "[_msg][id]"                => "msg_id"
            "[_msg][parentId]"          => "msg_parent_id"
            "[_msg][ephemeral]"         => "msg_ephemeral"
            "[_msg][data][toolName]"    => "tool_name"
            "[_msg][data][toolCallId]"  => "tool_call_id"
            "[_msg][data][turnId]"      => "turn_id"
            "[_msg][data][interactionId]" => "interaction_id"
            "[_msg][data][model]"       => "ai_model"
            "[_msg][data][outputTokens]" => "output_tokens"
            "[_msg][data][agentName]"   => "agent_name"
          }
        }

        # tool_success only meaningful for tool.execution_complete
        if [msg_type] == "tool.execution_complete" {
          mutate {
            rename => { "[_msg][data][success]" => "tool_success" }
          }
        }

        # output_tokens is a string after rename — convert to integer
        if [output_tokens] {
          mutate {
            convert => { "output_tokens" => "integer" }
          }
        }

        mutate {
          remove_field => ["_msg"]
        }
      }
    }
  }
}

output {
  if "ralph" in [tags] and "_jsonparsefailure" not in [tags] {
    if [path] =~ "dev-" {
      elasticsearch {
        hosts             => ["http://elasticsearch:9200"]
        index             => "logs-ralph-dev-%{+YYYY.MM.dd}"
        ecs_compatibility => "disabled"
        ilm_enabled       => false
      }
    } else if [path] =~ "fix_prs-" {
      elasticsearch {
        hosts             => ["http://elasticsearch:9200"]
        index             => "logs-ralph-fix_prs-%{+YYYY.MM.dd}"
        ecs_compatibility => "disabled"
        ilm_enabled       => false
      }
    }
  }
}
