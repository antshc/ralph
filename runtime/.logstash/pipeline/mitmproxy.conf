input {
  file {
    path             => "/var/log/mitmproxy/events_*.json"
    start_position   => "beginning"
    sincedb_path     => "/var/lib/logstash/sincedb/mitmproxy"
    codec            => plain { ecs_compatibility => "disabled" }
    tags             => ["mitmproxy"]
    ecs_compatibility => "disabled"
  }
}

filter {
  if "mitmproxy" in [tags] {
    json {
      source         => "message"
      tag_on_failure => ["_jsonparsefailure"]
    }
  }
}

output {
  if "mitmproxy" in [tags] and "_jsonparsefailure" not in [tags] {
    elasticsearch {
      hosts             => ["http://elasticsearch:9200"]
      index             => "logs-mitmproxy-%{+YYYY.MM.dd}"
      ecs_compatibility => "disabled"
    }
  } else if "mitmproxy" in [tags] and "_jsonparsefailure" in [tags] {
    elasticsearch {
      hosts             => ["http://elasticsearch:9200"]
      index             => "logs-mitmproxy-malformed-%{+YYYY.MM.dd}"
      ecs_compatibility => "disabled"
    }
  }
}
