services:
  ralph:
    image: antshc/ralph:latest
    cap_add:
      - NET_ADMIN
      - SETUID
      - SETGID
    cap_drop:
      - ALL
    stdin_open: true   # -i
    tty: true          # -t
    sysctls:
      net.ipv4.conf.all.route_localnet: 1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
      - COPILOT_MODEL=${COPILOT_MODEL:-claude-sonnet-4.6}
      # - HOST_DOCKER_DNAT_PORTS=${HOST_DOCKER_DNAT_PORTS}
      # GitHub CLI (gh) auth: mount ~/.config/gh (preferred) OR set GH_TOKEN.
      # - GH_TOKEN=${GH_TOKEN}
      # Optional: effort level: low, medium, high (not all models support it)
      # - COPILOT_EFFORT=${COPILOT_EFFORT}
      # Optional: output format: text, json, stream-json
      # - COPILOT_OUTPUT_FORMAT=${COPILOT_OUTPUT_FORMAT:-text}
      # Optional: log verbosity: none, error, warning, info, debug, all
      # - COPILOT_LOG_LEVEL=${COPILOT_LOG_LEVEL:-info}
      # Optional: directory for Copilot logs
      # - COPILOT_LOG_DIR=${COPILOT_LOG_DIR:-/var/log/copilot}
      # Optional: forward localhost ports to host.docker.internal (e.g. DynamoDB, Redis, Postgres)
      # Comma-separated ports and/or dash ranges: "8000", "8000,5432", "9200-9300"
    volumes:
      # Proxy traffic logs written by mitmproxy (one file per session, timestamped)
      - ./logs/mitmproxy:/var/log/mitmproxy
      # Copilot CLI session logs for debugging and audit
      - ./logs/copilot:/var/log/copilot
      # Project files — the working directory inside the container
      - ${WORKSPACE:?WORKSPACE is required}:/home/ubuntu/workspace
      # Host global git identity used as fallback when the repo has no local user config
      - ~/.gitconfig:/home/ubuntu/.gitconfig:ro
      # GitHub CLI auth tokens — required for `gh` commands inside the container
      - ~/.config/gh:/home/ubuntu/.config/gh:ro
      - ./rules:/etc/mitmproxy/user-rules:ro
      # Run plugin installs at startup (after proxy is ready)
      - ../src/setup.sh:/etc/sandbox/setup.sh:ro
      # Mount a folder of CA certificates (.crt/.pem) to trust private registries:
      # - ./certs:/etc/sandbox/certs:ro
      # Optional: run custom setup steps at startup (as ubuntu, after proxy is ready):
      # - ./setup.sh:/etc/sandbox/setup.sh:ro
      # Optional: expose the host Docker socket so integration tests can manage containers.
      # WARNING: This grants full Docker daemon access (equivalent to root on the host).
      # Only enable for trusted developer workloads — never in production or untrusted CI.
      # - /var/run/docker.sock:/var/run/docker.sock
    # Positional args for `ralph <repo-dir> <github-user> <owner/repo>`
    # Set GITHUB_USER and GITHUB_REPO before running.
    command:
      - afk_fix_prs
      - /home/ubuntu/workspace
      - ${GITHUB_USER:?GITHUB_USER is required}
      - ${GITHUB_REPO:?GITHUB_REPO is required}
      - "10"
      - --log-dir
      - /var/log/ralph
